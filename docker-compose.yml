version: '3.8'

services:
  # Eureka Discovery Server
  discovery-service:
    image: openjdk:17-jdk-slim
    container_name: discovery-service
    working_dir: /app
    volumes:
      - ./discovery-service/target:/app
    ports:
      - "8761:8761"
    command: java -jar discovery-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway
  gateway-service:
    image: openjdk:17-jdk-slim
    container_name: gateway-service
    working_dir: /app
    volumes:
      - ./gateway-service/target:/app
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
    command: java -jar gateway-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

  # User Service
  user-service:
    image: openjdk:17-jdk-slim
    container_name: user-service
    working_dir: /app
    volumes:
      - ./user-service/target:/app
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
    command: java -jar user-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

  # Restaurant Service
  restaurant-service:
    image: openjdk:17-jdk-slim
    container_name: restaurant-service
    working_dir: /app
    volumes:
      - ./restaurant-service/target:/app
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
    command: java -jar restaurant-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

  # Order Service
  order-service:
    image: openjdk:17-jdk-slim
    container_name: order-service
    working_dir: /app
    volumes:
      - ./order-service/target:/app
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
    command: java -jar order-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

  # Payment Service
  payment-service:
    image: openjdk:17-jdk-slim
    container_name: payment-service
    working_dir: /app
    volumes:
      - ./payment-service/target:/app
    ports:
      - "8084:8084"
    depends_on:
      - discovery-service
    command: java -jar payment-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

  # Notification Service
  notification-service:
    image: openjdk:17-jdk-slim
    container_name: notification-service
    working_dir: /app
    volumes:
      - ./notification-service/target:/app
    ports:
      - "8085:8085"
    depends_on:
      - discovery-service
    command: java -jar notification-service-0.0.1-SNAPSHOT.jar
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - food-delivery-network

networks:
  food-delivery-network:
    driver: bridge

